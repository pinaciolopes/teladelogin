<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <title>Desafio 2.1</title>
</head>

<body>

    <main>
        <section class="login">

            <div class="imagem">
                <img src="imagem/gangue.png" alt="gangue">
            </div>

            <div class="baixo">
                <div class="formulario">
                    <h1>Login</h1>
                    <p>Seja bem vindo a gangue!</p>
                    <form action="barata.html" method="get">
                        <div class="campo">
                            <i class="material-icons">person</i>
                            <label for="ilogin">E-mail</label>
                            <input type="email" name="email" id="iemail" placeholder="Digite seu E-mail" maxlength="30" required
                            autocomplete="email">

                        </div>
                    
                    
                    <div class="campo">
                        <i class="material-icons">vpn_key</i>
                        <label for="ilogin">Senha</label>
                        <input type="password" name="senha" id="isenha" placeholder="Digite sua Senha" maxlength="20" required
                        minlength="6">
                        
                    </div>
                    <hr>
                    <input type="submit" value="Entrar" id="submit">
                        <a href="recuperacao.html">Esqueci Minha Senha </a>
                    </form>
                </div>
            </div>
            
        </section>

        <div class="limagem">
                <img src="imagem/arma.png" alt="arma">
        </div>


    </main>


</body>

</html>
